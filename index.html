<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Khẩu Phần & Công Thức Thức Ăn Chăn Nuôi 2025</title>
<style>
/* ═══ ROOT & RESET ═══ */
:root {
  --primary: #0e7490; --primary-dark: #0a5b6f; --primary-light: #e0f7fa;
  --accent: #f59e0b; --accent-light: #fef3c7;
  --success: #059669; --danger: #dc2626; --warning: #d97706;
  --bg: #f0f4f8; --surface: #fff; --border: #e2e8f0;
  --text: #1e293b; --text-muted: #64748b;
  --shadow: 0 1px 3px rgba(0,0,0,.1); --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1);
  --radius: 10px; --radius-sm: 6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

/* ═══ HEADER ═══ */
.app-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:16px 24px}
.header-main{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header-main h1{font-size:20px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-time{font-size:13px;opacity:.9;font-family:monospace}
.header-sub{font-size:12px;opacity:.8;margin-top:4px}

/* ═══ TAB NAV ═══ */
.tab-nav{background:var(--surface);border-bottom:2px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-list{display:flex;min-width:max-content;padding:0 8px}
.tab-btn{display:flex;align-items:center;gap:5px;padding:10px 14px;border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab-btn:hover{color:var(--primary);background:var(--primary-light)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;background:var(--primary-light)}
.tab-manage{margin-left:auto}
.tab-icon{font-size:16px}

/* ═══ MAIN ═══ */
.main{padding:20px;max-width:1400px;margin:0 auto}
.tab-content{display:none}.tab-content.active{display:block}

/* ═══ OVERVIEW ═══ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow);border-left:4px solid}
.stat-card.c1{border-color:var(--primary)}.stat-card.c2{border-color:var(--accent)}.stat-card.c3{border-color:var(--success)}.stat-card.c4{border-color:#8b5cf6}.stat-card.c5{border-color:#ec4899}
.stat-val{font-size:32px;font-weight:800;color:var(--primary)}
.stat-lbl{font-size:13px;color:var(--text-muted);margin-top:4px}
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.ov-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.ov-card h3{font-size:15px;margin-bottom:12px;color:var(--primary)}
.sp-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.sp-count{font-weight:600;margin-left:auto;white-space:nowrap}
.sp-bar{flex:1;max-width:120px;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.sp-bar>div{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.log-list{max-height:240px;overflow-y:auto}
.log-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.log-name{flex:1}.log-time{color:var(--text-muted);font-size:12px;font-family:monospace}
.ov-footer{text-align:right;margin-top:16px}

/* ═══ PAGE HEADER ═══ */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-header h2{font-size:20px}
.page-desc{font-size:14px;color:var(--text-muted);margin-bottom:20px;line-height:1.6}

/* ═══ FORMULA CARD ═══ */
.formulas-list{display:flex;flex-direction:column;gap:24px}
.formula-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.fc-header{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.fc-name{font-size:18px;font-weight:700;margin-bottom:6px}
.fc-badges{display:flex;gap:6px;flex-wrap:wrap}
.fc-actions{display:flex;gap:4px}
.fc-meta{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--primary-light);font-size:13px}
.fc-price{font-weight:700;color:var(--primary-dark)}
.fc-time{color:var(--text-muted)}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-code{background:rgba(255,255,255,.25);color:#fff}
.badge-stage{background:var(--accent-light);color:var(--warning)}
.badge-weight{background:#e8f5e9;color:var(--success)}

/* ═══ BATCH SECTION ═══ */
.batch-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.batch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.batch-header h4{font-size:14px;color:var(--primary)}
.btn-toggle-mix{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-toggle-mix:hover{background:var(--warning)}
.batch-controls{display:flex;flex-direction:column;gap:10px}
.batch-presets{display:flex;flex-wrap:wrap;gap:6px}
.preset-btn{padding:6px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.preset-btn:hover{border-color:var(--primary);color:var(--primary)}
.preset-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.batch-custom{display:flex;align-items:center;gap:8px}
.batch-custom label{font-size:13px;font-weight:600;white-space:nowrap}
.batch-input{width:120px;padding:6px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:700;color:var(--primary);text-align:center}
.batch-input:focus{outline:none;border-color:var(--primary)}
.batch-unit{font-size:13px;font-weight:600}

/* ═══ MIX SHEET ═══ */
.mix-sheet{margin-top:16px;border:2px solid var(--primary);border-radius:var(--radius);padding:20px;background:#fefefe}
.mix-sheet-header{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--primary)}
.mix-sheet-header h4{font-size:18px;color:var(--primary-dark);letter-spacing:2px}
.mix-sheet-info{display:flex;justify-content:center;gap:24px;margin-top:8px;font-size:13px;flex-wrap:wrap}
.mix-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.mix-table th,.mix-table td{border:1px solid #ccc;padding:6px 10px}
.mix-table th{background:var(--primary-light);font-weight:700;font-size:12px}
.mix-table .total-row{background:#fff3cd;font-weight:700}
.mix-table .price-row{background:#d4edda;font-weight:700}
.mix-sheet-footer{display:flex;justify-content:space-around;gap:16px;margin-top:20px;padding-top:16px;border-top:1px dashed #ccc}
.sign-box{text-align:center;font-size:12px}
.sign-line{width:140px;height:1px;background:#999;margin:40px auto 0}
.mix-nutrition-summary{display:flex;flex-wrap:wrap;gap:8px;padding:12px 0;margin-top:12px;border-top:1px dashed var(--border)}
.mix-nut-row{display:flex;gap:6px;background:#f0f9ff;padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid #bae6fd}
.mix-nut-row span{color:var(--text-muted)}.mix-nut-row strong{color:var(--primary-dark)}

/* ═══ FC SECTIONS & TABLES ═══ */
.fc-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.fc-section h4{font-size:14px;color:var(--primary);margin-bottom:10px}
.table-wrap{overflow-x:auto}
.ing-table,.nut-table,.data-table,.mini-table{width:100%;border-collapse:collapse;font-size:13px}
.ing-table th,.ing-table td,.nut-table th,.nut-table td,.data-table th,.data-table td{border:1px solid var(--border);padding:7px 10px}
.ing-table th,.nut-table th,.data-table th{background:var(--primary-light);font-weight:700;font-size:12px;white-space:nowrap}
.center{text-align:center}.right{text-align:right}.bold{font-weight:700}
.total-row{background:#fff9db}.total-row td{font-weight:700}
.status-ok{color:var(--success)}.status-low{color:var(--danger)}.status-high{color:var(--warning)}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.status-badge.status-ok{background:#d1fae5;color:#065f46}
.status-badge.status-low{background:#fee2e2;color:#991b1b}
.status-badge.status-high{background:#fef3c7;color:#92400e}

/* ═══ PREMIX ═══ */
.premix-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.premix-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,transform .2s;border:1px solid var(--border)}
.premix-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.premix-card-header{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 16px 10px;background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-bottom:1px solid var(--border)}
.premix-card-header h3{font-size:16px;margin-bottom:4px;color:var(--primary)}
.premix-card-actions{display:flex;gap:4px}
.premix-card-body{padding:12px 16px}
.premix-section{margin-bottom:12px}
.premix-section h4{font-size:13px;margin:0 0 8px;color:var(--primary-dark);font-weight:700}
.premix-card-footer{padding:8px 16px;border-top:1px solid var(--border);background:#f8fafc;font-size:11px}
.mini-table{font-size:12px}
.mini-table th{padding:4px 6px;background:#f1f5f9;font-weight:600;text-align:left;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.mini-table th:last-child{text-align:right}
.mini-table td{padding:3px 6px;border-bottom:1px solid var(--border)}
.mini-table td:first-child{font-weight:600}
.mini-table td:last-child{text-align:right}

/* ═══ CATEGORY BADGES ═══ */
.cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.cat-badge.cat-nang-luong{background:#fef3c7;color:#92400e}
.cat-badge.cat-dam{background:#dbeafe;color:#1e40af}
.cat-badge.cat-khoang{background:#e0e7ff;color:#4338ca}
.cat-badge.cat-vitamin{background:#d1fae5;color:#065f46}
.cat-badge.cat-phu-gia{background:#fce7f3;color:#9d174d}
.cat-badge.cat-khac,.cat-badge.cat-nguyen-lieu{background:#fef3c7;color:#92400e}
.cat-badge.cat-khoang-vi-luong{background:#e0e7ff;color:#4338ca}

/* ═══ BUTTONS ═══ */
.btn-primary{background:var(--primary);color:#fff;border:none;padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--primary-dark)}
.btn-secondary{background:#6366f1;color:#fff;border:none;padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-secondary:hover{background:#4f46e5}
.btn-success{background:var(--success);color:#fff;border:none;padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer}
.btn-success:hover{opacity:.9}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer}.btn-danger:hover{opacity:.9}
.btn-icon{background:transparent;border:none;font-size:16px;cursor:pointer;padding:4px;border-radius:4px;transition:background .2s}.btn-icon:hover{background:rgba(0,0,0,.08)}
.btn-save{background:var(--success);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}.btn-save:hover{opacity:.9}
.btn-cancel{background:#e2e8f0;color:var(--text);border:none;padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer}
.btn-remove{background:var(--danger);color:#fff;border:none;width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-add-ing{background:transparent;border:2px dashed var(--primary);color:var(--primary);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:8px}
.btn-add-ing:hover{background:var(--primary-light)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* ═══ FORMS ═══ */
.crud-form{display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.formula-ing-list{display:flex;flex-direction:column;gap:6px}
.ing-row{display:flex;align-items:center;gap:8px}
.ing-row select{flex:2}.ing-row input{width:80px;text-align:center}
.ing-amount{font-size:12px;color:var(--text-muted);white-space:nowrap;width:70px}
.text-danger{color:var(--danger)!important}.text-ok{color:var(--success)!important}.text-muted{color:var(--text-muted)}.warning-text{color:var(--warning);font-size:12px}

/* ═══ IMPORT/PRICE UPDATE ═══ */
.import-section{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border)}
.import-section h3{font-size:16px;color:var(--primary);margin-bottom:8px}
.import-section p{font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6}
.file-drop{border:3px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;background:#fafbfc}
.file-drop:hover,.file-drop.dragover{border-color:var(--primary);background:var(--primary-light)}
.file-drop-icon{font-size:48px;margin-bottom:12px}
.file-drop-text{font-size:15px;font-weight:600;margin-bottom:4px}
.file-drop-hint{font-size:12px;color:var(--text-muted)}
.file-input{display:none}
.template-box{background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--radius-sm);padding:16px;margin-top:16px}
.template-box h4{font-size:14px;color:var(--primary-dark);margin-bottom:8px}
.template-box pre{background:#1e293b;color:#e2e8f0;padding:12px;border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;line-height:1.6;white-space:pre-wrap}
.template-box code{font-family:'Fira Code','Cascadia Code',monospace}
.preview-table{margin-top:16px;border:2px solid var(--primary);border-radius:var(--radius-sm);overflow:hidden}
.preview-header{background:var(--primary);color:#fff;padding:10px 16px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.preview-body{max-height:400px;overflow-y:auto;padding:0}
.preview-actions{padding:16px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);background:#f8fafc}
.change-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px}
.change-row:nth-child(even){background:#f8fafc}
.change-row .name{font-weight:600;flex:1;min-width:120px}
.change-row .old{color:var(--text-muted);text-decoration:line-through}
.change-row .arrow{color:var(--primary);font-weight:700}
.change-row .new{color:var(--success);font-weight:700}
.change-row .diff{font-size:11px;padding:2px 6px;border-radius:10px;font-weight:600}
.diff-up{background:#fee2e2;color:#991b1b}
.diff-down{background:#d1fae5;color:#065f46}
.diff-new{background:#dbeafe;color:#1e40af}
.price-history{margin-top:20px}
.price-history h3{font-size:16px;color:var(--primary);margin-bottom:12px}
.manual-price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:16px}
.manual-price-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:10px}
.manual-price-item .mp-name{font-weight:600;flex:1;font-size:13px}
.manual-price-item input{width:100px;padding:6px 8px;border:2px solid var(--border);border-radius:var(--radius-sm);text-align:right;font-weight:600;font-size:13px}
.manual-price-item input:focus{border-color:var(--primary);outline:none}
.manual-price-item .mp-unit{font-size:12px;color:var(--text-muted)}
.import-result{padding:16px;border-radius:var(--radius-sm);margin-top:16px;font-size:13px}
.import-result.success{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46}
.import-result.error{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-content{background:var(--surface);border-radius:var(--radius);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--primary-light)}
.modal-header h3{font-size:16px;color:var(--primary-dark)}
.modal-close{background:transparent;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modal-close:hover{background:#fee2e2;color:var(--danger)}
.modal-body{padding:20px}

/* ═══ TAB MANAGEMENT ═══ */
.tab-mgmt h4{font-size:14px;color:var(--primary);margin-bottom:12px}
.tab-toggle-list{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.tab-toggle-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm)}
.switch{position:relative;width:42px;height:22px;display:inline-block}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#cbd5e1;border-radius:11px;cursor:pointer;transition:background .3s}
.slider::before{content:'';position:absolute;width:16px;height:16px;bottom:3px;left:3px;background:#fff;border-radius:50%;transition:transform .3s}
.switch input:checked+.slider{background:var(--primary)}
.switch input:checked+.slider::before{transform:translateX(20px)}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty p{margin-bottom:16px;font-size:15px}
.app-footer{text-align:center;padding:16px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .header-main h1{font-size:16px}.main{padding:12px}
  .overview-grid,.form-row-3{grid-template-columns:1fr}
  .form-row-2{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
  .tab-btn .tab-text{display:none}.tab-btn .tab-icon{font-size:18px}.tab-btn{padding:10px 12px}
  .fc-header,.fc-section,.batch-section{padding:12px 14px}
  .mix-sheet{padding:12px}.mix-sheet-info{flex-direction:column;gap:4px}
  .mix-sheet-footer{flex-direction:column;gap:20px}.sign-line{width:100px;margin-top:24px}
  .ing-row{flex-wrap:wrap}.ing-row select{flex:1 1 100%}
  .premix-grid{grid-template-columns:1fr}
  .manual-price-grid{grid-template-columns:1fr}
}
@media print{
  .app-header,.tab-nav,.app-footer,.fc-actions,.batch-controls,.batch-header button,.btn-primary,.btn-danger,.btn-secondary,.btn-success,.import-section,.file-drop{display:none!important}
  .mix-sheet{border:1px solid #333}.formula-card{break-inside:avoid;box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="app-header">

// ─── Data Store ───
let data;
function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const p = JSON.parse(s); if (p.version === VERSION) { data = p; return; } }
  } catch(e) {}
  data = {
    ingredients: JSON.parse(JSON.stringify(INIT_INGREDIENTS)).map(i => ({...i,unit:'kg',createdAt:ts(),updatedAt:ts(),isActive:true})),
    formulas: JSON.parse(JSON.stringify(INIT_FORMULAS)).map(f => ({...f,createdAt:ts(),updatedAt:ts(),isActive:true})),
    premixProducts: JSON.parse(JSON.stringify(INIT_PREMIX)).map(p => ({...p,unit:'IU/kg',createdAt:ts(),updatedAt:ts()})),
    feedStandards: JSON.parse(JSON.stringify(INIT_STANDARDS)).map(s => ({...s,createdAt:ts(),updatedAt:ts()})),
    mixingLimits: JSON.parse(JSON.stringify(INIT_LIMITS)),
    logs: [],
    priceHistory: [],
    tabs: JSON.parse(JSON.stringify(INIT_TABS)),
    lastSync: ts(),
    version: VERSION
  };
}
function saveData() { data.lastSync = ts(); try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }
function addLog(action, entityType, entityName) {
  data.logs.unshift({id:genId('log'),action,entityType,entityName,timestamp:ts()});
  if (data.logs.length > 100) data.logs = data.logs.slice(0, 100);
}
function getIng(id) { return data.ingredients.find(i => i.id === id); }
function getActiveIngs() { return data.ingredients.filter(i => i.isActive); }
function findIngByName(name) {
  const n = name.trim().toLowerCase();
  return data.ingredients.find(i => i.isActive && i.name.toLowerCase() === n);
}
function getFormulas(species) {
  let f = data.formulas.filter(x => x.isActive);
  if (species) f = f.filter(x => x.species === species);
  return f.sort((a,b) => a.tabOrder - b.tabOrder);
}
function calcNutrition(formula) {
  const n = {ME:0,protein:0,lysine:0,methionine:0,methionineCystine:0,calcium:0,phosphorus:0};
  formula.ingredients.forEach(fi => {
    const ing = getIng(fi.ingredientId);
    if (!ing || !ing.nutrition) return;
    const pct = fi.percentage / 100;
    n.ME += (ing.nutrition.ME||0)*pct;
    n.protein += (ing.nutrition.protein||0)*pct;
    n.lysine += (ing.nutrition.lysine||0)*pct;
    n.methionine += (ing.nutrition.methionine||0)*pct;
    n.methionineCystine += (ing.nutrition.methionineCystine||0)*pct;
    n.calcium += (ing.nutrition.calcium||0)*pct;
    n.phosphorus += (ing.nutrition.phosphorus||0)*pct;
  });
  return {ME:Math.round(n.ME),protein:Math.round(n.protein*100)/100,lysine:Math.round(n.lysine*1000)/1000,
    methionine:Math.round(n.methionine*1000)/1000,methionineCystine:Math.round(n.methionineCystine*1000)/1000,
    calcium:Math.round(n.calcium*100)/100,phosphorus:Math.round(n.phosphorus*100)/100};
}
function calcPrice(formula) {
  let t = 0;
  formula.ingredients.forEach(fi => { const ing = getIng(fi.ingredientId); if (ing) t += ing.price * fi.percentage / 100; });
  return Math.round(t);
}
function calcBatch(formula, batchKg) {
  return formula.ingredients.map(fi => {
    const ing = getIng(fi.ingredientId);
    return {ingredientId:fi.ingredientId,name:ing?ing.name:'N/A',percentage:fi.percentage,amount:Math.round(fi.percentage/100*batchKg*100)/100};
  });
}
function speciesLabel(s){
  const m={'heo':'🐷 Heo','ga':'🥚 Gà đẻ giống','ga-de-cn':'🏭 Gà đẻ CN','ga-thit':'🍗 Gà thịt','da-dieu':'🦤 Đà điểu','khac':'📋 Khác'};
  return m[s]||s;
}
function catLabel(c){
  const m={'nang-luong':'NL','dam':'Đạm','khoang':'Khoáng','vitamin':'Vit','phu-gia':'PG','khac':'Khác','nguyen-lieu':'Nguyên liệu','khoang-vi-luong':'Khoáng'};
  return m[c]||c;
}

function renderTabs() {
  const el = document.getElementById('tabList');
  const tabs = data.tabs.filter(t => t.isActive).sort((a,b) => a.order - b.order);
  el.innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeTab===t.id?'active':''}" onclick="switchTab('${t.id}')">

    </button>`
  ).join('') + `<button class="tab-btn tab-manage" onclick="openTabManager()">⚙️</button>`;
}

function switchTab(id) { activeTab = id; renderTabs(); renderContent(); }

function renderContent() {
  const tab = data.tabs.find(t => t.id === activeTab);
  if (!tab) { document.getElementById('mainContent').innerHTML = ''; return; }
  const main = document.getElementById('mainContent');
  switch(tab.entityType) {
    case 'overview': main.innerHTML = renderOverview(); break;
    case 'formula': main.innerHTML = renderFormulas(tab); break;
    case 'premix': main.innerHTML = renderPremix(); break;
    case 'standard': main.innerHTML = renderStandards(); break;
    case 'price': main.innerHTML = renderIngredients(); break;
    case 'limits': main.innerHTML = renderLimits(); break;
    case 'price-update': main.innerHTML = renderPriceUpdate(); break;
    case 'import-formula': main.innerHTML = renderImportFormula(); break;
    default: main.innerHTML = '<div class="empty"><p>Nội dung chưa thiết lập.</p></div>';

}

function handlePriceFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    parsePriceCSV(text);
  };
  reader.readAsText(file, 'UTF-8');
}

function parsePriceCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) { showPriceResult('error', 'File không có dữ liệu!'); return; }

  const changes = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Support comma, tab, semicolon
    const parts = line.split(/[,;\t]+/);
    if (parts.length < 2) continue;
    const name = parts[0].trim();
    const newPrice = parseFloat(parts[1].replace(/[^\d.]/g, ''));
    if (!name || isNaN(newPrice)) continue;

    const ing = findIngByName(name);
    if (ing) {
      changes.push({
        id: ing.id,
        name: ing.name,
        oldPrice: ing.price,
        newPrice: newPrice,
        diff: ((newPrice - ing.price) / ing.price * 100).toFixed(1)
      });
    } else {
      changes.push({
        id: null,
        name: name,
        oldPrice: null,
        newPrice: newPrice,
        diff: null,
        isNew: true
      });
    }
  }

  if (!changes.length) { showPriceResult('error', 'Không tìm thấy nguyên liệu nào khớp trong file!'); return; }

  pendingPriceChanges = changes;
  showPricePreview(changes);
}

function showPricePreview(changes) {
  const matched = changes.filter(c => !c.isNew);
  const unmatched = changes.filter(c => c.isNew);

  let html = `<div class="preview-table">
    <div class="preview-header">
      <span>📋 Xem trước thay đổi giá (${matched.length} khớp${unmatched.length ? ', ' + unmatched.length + ' không tìm thấy' : ''})</span>
    </div>
    <div class="preview-body">`;

  matched.forEach(c => {
    const diffNum = parseFloat(c.diff);
    const diffClass = diffNum > 0 ? 'diff-up' : diffNum < 0 ? 'diff-down' : '';
    html += `<div class="change-row">
      <span class="name">${c.name}</span>
      <span class="old">${fmt(c.oldPrice)} ₫</span>
      <span class="arrow">→</span>
      <span class="new">${fmt(c.newPrice)} ₫</span>
      <span class="diff ${diffClass}">${diffNum>=0?'+':''}${c.diff}%</span>
    </div>`;
  });

  unmatched.forEach(c => {
    html += `<div class="change-row" style="opacity:.6">
      <span class="name">${c.name} <span class="diff diff-new">MỚI</span></span>
      <span style="flex:1;text-align:right;font-size:12px;color:var(--text-muted)">Không tìm thấy — sẽ tạo nguyên liệu mới với giá ${fmt(c.newPrice)} ₫</span>
    </div>`;
  });

  html += `</div>
    <div class="preview-actions">
      <button class="btn-cancel" onclick="cancelPriceImport()">Hủy</button>
      <button class="btn-save" onclick="applyPriceChanges()">✅ Áp dụng ${matched.length + unmatched.length} thay đổi</button>
    </div>
  </div>`;

  document.getElementById('pricePreview').innerHTML = html;
}

function cancelPriceImport() {
  pendingPriceChanges = null;
  document.getElementById('pricePreview').innerHTML = '';
}

function applyPriceChanges() {
  if (!pendingPriceChanges) return;
  let count = 0;
  const details = [];

  pendingPriceChanges.forEach(c => {
    if (c.id) {
      const ing = getIng(c.id);
      if (ing) {
        ing.price = c.newPrice;
        ing.updatedAt = ts();
        details.push(`${c.name}: ${fmt(c.oldPrice)}→${fmt(c.newPrice)}`);
        count++;
      }
    } else if (c.isNew) {
      data.ingredients.push({
        id: genId('ing'), name: c.name, category: 'khac', unit: 'kg',
        price: c.newPrice, nutrition: {},
        createdAt: ts(), updatedAt: ts(), isActive: true
      });
      details.push(`${c.name}: MỚI ${fmt(c.newPrice)}`);
      count++;
    }
  });

  if (!data.priceHistory) data.priceHistory = [];
  data.priceHistory.unshift({
    id: genId('ph'), timestamp: ts(), source: 'file', count: count,
    details: details.join('; ')
  });
  if (data.priceHistory.length > 50) data.priceHistory = data.priceHistory.slice(0, 50);

  addLog('price-update', 'ingredient', `Cập nhật giá ${count} nguyên liệu (file)`);
  saveData();

  pendingPriceChanges = null;
  document.getElementById('pricePreview').innerHTML = `<div class="import-result success">✅ Đã cập nhật giá cho <strong>${count} nguyên liệu</strong>. Tất cả công thức đã được tính lại giá tự động!</div>`;
}

function saveManualPrices() {
  const ings = getActiveIngs();
  let count = 0;
  const details = [];

  ings.forEach(i => {
    const el = document.getElementById('mp-' + i.id);
    if (!el) return;
    const newPrice = Number(el.value);
    if (newPrice !== i.price && newPrice >= 0) {
      details.push(`${i.name}: ${fmt(i.price)}→${fmt(newPrice)}`);
      i.price = newPrice;
      i.updatedAt = ts();
      count++;
    }
  });

  if (count === 0) {
    document.getElementById('manualPriceResult').innerHTML = `<div class="import-result error" style="margin-top:12px">Không có thay đổi nào!</div>`;
    return;
  }

  if (!data.priceHistory) data.priceHistory = [];
  data.priceHistory.unshift({
    id: genId('ph'), timestamp: ts(), source: 'manual', count: count,
    details: details.join('; ')
  });
  if (data.priceHistory.length > 50) data.priceHistory = data.priceHistory.slice(0, 50);

  addLog('price-update', 'ingredient', `Cập nhật giá ${count} nguyên liệu (thủ công)`);
  saveData();

  document.getElementById('manualPriceResult').innerHTML = `<div class="import-result success" style="margin-top:12px">✅ Đã cập nhật <strong>${count} nguyên liệu</strong>. Giá thành công thức sẽ thay đổi tự động!</div>`;
}

function handleFormulaFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    if (file.name.endsWith('.json')) {
      parseFormulaJSON(text);
    } else {
      parseFormulaCSV(text);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

function parseFormulaJSON(text) {
  try {
    let raw = JSON.parse(text);
    if (!Array.isArray(raw)) raw = [raw];

    const formulas = raw.map(r => parseOneFormula(r));
    if (!formulas.length) { showFormulaResult('error', 'Không tìm thấy công thức hợp lệ trong file!'); return; }

    pendingFormulaImport = formulas;
    showFormulaPreview(formulas);
  } catch(e) {
    showFormulaResult('error', 'Lỗi đọc file JSON: ' + e.message);
  }
}

function parseFormulaCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const formulas = [];
  let current = null;
  let readingIngredients = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    if (line === 'FORMULA_START') {
      current = { ingredients: [], nutritionRequirement: {} };
      readingIngredients = false;
      continue;
    }
    if (line === 'FORMULA_END') {
      if (current && current.name) {
        formulas.push(parseOneFormula(current));
      }
      current = null;
      readingIngredients = false;
      continue;
    }
    if (line === 'INGREDIENTS') {
      readingIngredients = true;
      continue;
    }

    if (!current) continue;

    const parts = line.split(/[,;\t]+/);
    if (parts.length < 2) continue;

    if (readingIngredients) {
      const name = parts[0].trim();
      const pct = parseFloat(parts[1]);
      if (name && !isNaN(pct)) {
        current.ingredients.push({ name, percentage: pct });
      }
    } else {
      const key = parts[0].trim();
      const val = parts[1].trim();
      if (key.startsWith('req_')) {
        const nKey = key.replace('req_', '');
        current.nutritionRequirement[nKey] = parseFloat(val) || 0;
      } else {
        current[key] = isNaN(val) ? val : parseFloat(val);
      }
    }
  }

  // Handle single formula without FORMULA_START/END markers
  if (!formulas.length && current && current.name) {
    formulas.push(parseOneFormula(current));
  }

  if (!formulas.length) { showFormulaResult('error', 'Không tìm thấy công thức hợp lệ trong file!'); return; }

  pendingFormulaImport = formulas;
  showFormulaPreview(formulas);
}

function parseOneFormula(raw) {
  const ingredients = (raw.ingredients || []).map(ri => {
    const ingName = ri.name || ri.ingredientName || '';
    const ing = findIngByName(ingName);
    return {
      ingredientId: ing ? ing.id : null,
      ingredientName: ingName,
      percentage: ri.percentage || 0,
      isNew: !ing
    };
  });

  return {
    name: raw.name || 'Chưa đặt tên',
    code: raw.code || 'NEW',
    species: raw.species || 'khac',
    stage: raw.stage || '',
    targetWeight: raw.targetWeight || '',
    batchSize: raw.batchSize || 1000,
    ingredients: ingredients,
    nutritionRequirement: raw.nutritionRequirement || {ME:3000,protein:18,lysine:1,methionine:0.3,calcium:0.7,phosphorus:0.5}
  };
}

function applyFormulaImport() {

  pendingFormulaImport.forEach(fm => {

      return {
        ingredientId: ingId,
        percentage: fi.percentage,
        amount: Math.round(fi.percentage / 100 * fm.batchSize * 100) / 100

    const newFormula = {
      id: genId('f'),

      createdAt: ts(),

      isActive: true,
      tabOrder: data.formulas.length + 1
    };

    data.formulas.push(newFormula);
    addLog('create', 'formula', fm.name + ' (import)');

}
function toggleMixSheet(fid) {
  const el = document.getElementById('mix-'+fid);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════════════ */
function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

/* ═══════════════════════════════════════════════════════════════
   INGREDIENT FORM
   ═══════════════════════════════════════════════════════════════ */
function openIngForm(id) {
  const ing = id ? getIng(id) : null;
  const title = ing ? 'Chỉnh sửa nguyên liệu' : 'Thêm nguyên liệu mới';
  const n = ing ? ing.nutrition : {};
  openModal(title, `<form class="crud-form" onsubmit="saveIng(event,'${id||''}')">
    <div class="form-group"><label>Tên nguyên liệu</label><input id="fi-name" value="${ing?ing.name:''}" required/></div>
    <div class="form-row-3">
      <div class="form-group"><label>Danh mục</label><select id="fi-cat">
        ${['nang-luong','dam','khoang','vitamin','phu-gia','khac'].map(c=>`<option value="${c}" ${ing&&ing.category===c?'selected':''}>${catLabel(c)}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Giá (₫/kg)</label><input type="number" id="fi-price" value="${ing?ing.price:0}" required/></div>
      <div class="form-group"></div>
    </div>
    <h4>Dinh dưỡng</h4>
    <div class="form-row-3">
      <div class="form-group"><label>ME (kcal/kg)</label><input type="number" id="fi-ME" value="${n.ME||''}"/></div>
      <div class="form-group"><label>Protein (%)</label><input type="number" step="0.01" id="fi-protein" value="${n.protein||''}"/></div>
      <div class="form-group"><label>Lysine (%)</label><input type="number" step="0.01" id="fi-lysine" value="${n.lysine||''}"/></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Methionine (%)</label><input type="number" step="0.01" id="fi-methionine" value="${n.methionine||''}"/></div>
      <div class="form-group"><label>M+C (%)</label><input type="number" step="0.01" id="fi-mc" value="${n.methionineCystine||''}"/></div>
      <div class="form-group"><label>Canxi (%)</label><input type="number" step="0.01" id="fi-calcium" value="${n.calcium||''}"/></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Phospho (%)</label><input type="number" step="0.01" id="fi-phosphorus" value="${n.phosphorus||''}"/></div>
      <div class="form-group"></div><div class="form-group"></div>
    </div>
    <div class="form-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button><button type="submit" class="btn-save">💾 Lưu</button></div>
  </form>`);
}

function saveIng(e, id) {
  e.preventDefault();
  const get = (sel) => document.getElementById(sel).value;
  const nut = {};
  ['ME','protein','lysine','methionine','calcium','phosphorus'].forEach(k => { const v = get('fi-'+k); if (v) nut[k] = Number(v); });
  const mc = get('fi-mc'); if (mc) nut.methionineCystine = Number(mc);
  if (id) {
    const idx = data.ingredients.findIndex(i=>i.id===id);
    if (idx>=0) { Object.assign(data.ingredients[idx], {name:get('fi-name'),category:get('fi-cat'),price:Number(get('fi-price')),nutrition:nut,updatedAt:ts()}); addLog('update','ingredient',get('fi-name')); }
  } else {
    data.ingredients.push({id:genId('ing'),name:get('fi-name'),category:get('fi-cat'),unit:'kg',price:Number(get('fi-price')),nutrition:nut,createdAt:ts(),updatedAt:ts(),isActive:true});
    addLog('create','ingredient',get('fi-name'));
  }
  saveData(); closeModal(); renderContent();
}

function deleteIng(id) {
  if (!confirm('Xóa nguyên liệu này?')) return;
  const idx = data.ingredients.findIndex(i=>i.id===id);
  if (idx>=0) { data.ingredients[idx].isActive=false; addLog('delete','ingredient',data.ingredients[idx].name); saveData(); renderContent(); }
}

/* ═══════════════════════════════════════════════════════════════
   FORMULA FORM
   ═══════════════════════════════════════════════════════════════ */
let formulaIngList = [];
function openFormulaForm(id) {
  const fm = id ? data.formulas.find(f=>f.id===id) : null;
  formulaIngList = fm ? JSON.parse(JSON.stringify(fm.ingredients)) : [];
  const title = fm ? 'Chỉnh sửa công thức' : 'Thêm công thức mới';
  const nr = fm ? fm.nutritionRequirement : {ME:3000,protein:18,lysine:1,methionine:0.3,methionineCystine:0.6,calcium:0.7,phosphorus:0.5};
  openModal(title, `<form class="crud-form" onsubmit="saveFormula(event,'${id||''}')">
    <div class="form-row-3">
      <div class="form-group"><label>Tên công thức</label><input id="ff-name" value="${fm?fm.name:''}" required/></div>
      <div class="form-group"><label>Mã</label><input id="ff-code" value="${fm?fm.code:''}" required/></div>
      <div class="form-group"><label>Loài</label><select id="ff-species">
        ${['heo','ga','ga-de-cn','ga-thit','da-dieu','khac'].map(s=>`<option value="${s}" ${fm&&fm.species===s?'selected':''}>${speciesLabel(s)}</option>`).join('')}
      </select></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Giai đoạn</label><input id="ff-stage" value="${fm?fm.stage:''}" required/></div>
      <div class="form-group"><label>Trọng lượng mục tiêu</label><input id="ff-tw" value="${fm?fm.targetWeight||'':''}" /></div>
      <div class="form-group"><label>Mẻ trộn mặc định (kg)</label><input type="number" id="ff-batch" value="${fm?fm.batchSize:1000}"/></div>
    </div>
    <h4>Nguyên liệu (tổng: <span id="ff-total-pct">0</span>%)</h4>
    <div id="ff-ing-list" class="formula-ing-list"></div>
    <button type="button" class="btn-add-ing" onclick="addFormulaIng()">+ Thêm nguyên liệu</button>
    <h4>Yêu cầu dinh dưỡng</h4>
    <div class="form-row-3">
      <div class="form-group"><label>ME (kcal/kg)</label><input type="number" id="ff-rME" value="${nr.ME}"/></div>
      <div class="form-group"><label>Protein (%)</label><input type="number" step="0.1" id="ff-rProtein" value="${nr.protein}"/></div>
      <div class="form-group"><label>Lysine (%)</label><input type="number" step="0.01" id="ff-rLys" value="${nr.lysine}"/></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Methionine (%)</label><input type="number" step="0.01" id="ff-rMet" value="${nr.methionine}"/></div>
      <div class="form-group"><label>M+C (%)</label><input type="number" step="0.01" id="ff-rMC" value="${nr.methionineCystine||''}"/></div>
      <div class="form-group"><label>Canxi (%)</label><input type="number" step="0.01" id="ff-rCa" value="${nr.calcium}"/></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label>Phospho (%)</label><input type="number" step="0.01" id="ff-rP" value="${nr.phosphorus}"/></div>
      <div class="form-group"></div><div class="form-group"></div>
    </div>
    <div class="form-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button><button type="submit" class="btn-save">💾 Lưu công thức</button></div>
  </form>`);
  renderFormulaIngList();
}

function renderFormulaIngList() {
  const ings = getActiveIngs();
  const bs = Number(document.getElementById('ff-batch')?.value || 1000);
  const el = document.getElementById('ff-ing-list');
  if (!el) return;
  el.innerHTML = formulaIngList.map((fi,i) => `<div class="ing-row">
    <select onchange="formulaIngList[${i}].ingredientId=this.value">
      <option value="">-- Chọn --</option>
      ${ings.map(ing=>`<option value="${ing.id}" ${fi.ingredientId===ing.id?'selected':''}>${ing.name}</option>`).join('')}
    </select>
    <input type="number" step="0.001" placeholder="%" value="${fi.percentage||''}" onchange="updateFormulaIngPct(${i},this.value)"/>
    <span class="ing-amount">${(fi.percentage/100*bs).toFixed(2)} kg</span>
    <button type="button" class="btn-remove" onclick="removeFormulaIng(${i})">✕</button>
  </div>`).join('');
  const total = formulaIngList.reduce((s,i)=>s+i.percentage,0);
  const sp = document.getElementById('ff-total-pct');
  if (sp) { sp.textContent = total.toFixed(1); sp.className = Math.abs(total-100)>1 ? 'text-danger':'text-ok'; }
}

function addFormulaIng() { formulaIngList.push({ingredientId:'',percentage:0,amount:0}); renderFormulaIngList(); }
function removeFormulaIng(i) { formulaIngList.splice(i,1); renderFormulaIngList(); }
function updateFormulaIngPct(i,v) {
  formulaIngList[i].percentage = Number(v);
  const bs = Number(document.getElementById('ff-batch')?.value || 1000);
  formulaIngList[i].amount = Math.round(Number(v)/100*bs*100)/100;
  renderFormulaIngList();
}

function saveFormula(e, id) {
  e.preventDefault();
  const get = sel => document.getElementById(sel).value;
  const total = formulaIngList.reduce((s,i)=>s+i.percentage,0);
  if (Math.abs(total-100) > 1) { alert(`Tổng tỷ lệ phải ≈ 100% (hiện: ${total.toFixed(1)}%)`); return; }
  const fd = {
    name:get('ff-name'),code:get('ff-code'),species:get('ff-species'),stage:get('ff-stage'),
    targetWeight:get('ff-tw'),batchSize:Number(get('ff-batch')),ingredients:formulaIngList,
    nutritionRequirement:{ME:Number(get('ff-rME')),protein:Number(get('ff-rProtein')),lysine:Number(get('ff-rLys')),
      methionine:Number(get('ff-rMet')),methionineCystine:Number(get('ff-rMC')||0),calcium:Number(get('ff-rCa')),phosphorus:Number(get('ff-rP'))},
    nutrition:{},pricePerKg:0,updatedAt:ts()
  };
  if (id) {
    const idx = data.formulas.findIndex(f=>f.id===id);
    if (idx>=0) { Object.assign(data.formulas[idx], fd); addLog('update','formula',fd.name); }
  } else {
    data.formulas.push({...fd,id:genId('f'),createdAt:ts(),isActive:true,tabOrder:data.formulas.length+1});
    addLog('create','formula',fd.name);
  }
  saveData(); closeModal(); renderContent();
}

function deleteFormula(id) {
  if (!confirm('Xóa công thức này?')) return;
  const idx = data.formulas.findIndex(f=>f.id===id);
  if (idx>=0) { data.formulas[idx].isActive=false; addLog('delete','formula',data.formulas[idx].name); saveData(); renderContent(); }
}

/* ═══════════════════════════════════════════════════════════════
   PREMIX FORM
   ═══════════════════════════════════════════════════════════════ */
function openPremixForm(id) {
  const pm = id ? data.premixProducts.find(p=>p.id===id) : null;
  const title = pm ? `Chỉnh sửa: ${pm.name}` : 'Thêm Premix mới';
  const v = pm ? pm.vitamins||{} : {};
  const m = pm ? pm.minerals||{} : {};
  const vitKeys = ['A','D3','E','K','B1','B2','B6','B12','niacin','pantothenic','folic','biotin'];
  const minKeys = ['iron','zinc','copper','manganese','iodine','selenium','cobalt'];
  const vitLabels = {A:'Vitamin A (IU)',D3:'Vitamin D3 (IU)',E:'Vitamin E (IU)',K:'Vitamin K (mg)',B1:'B1 (mg)',B2:'B2 (mg)',B6:'B6 (mg)',B12:'B12 (mcg)',niacin:'Niacin (mg)',pantothenic:'Pantothenic (mg)',folic:'Folic (mg)',biotin:'Biotin (mcg)'};
  const minLabels = {iron:'Sắt Fe',zinc:'Kẽm Zn',copper:'Đồng Cu',manganese:'Mangan Mn',iodine:'Iốt I',selenium:'Selen Se',cobalt:'Coban Co'};

  openModal(title, `<form class="crud-form" onsubmit="savePremix(event,'${id||''}')">
    <div class="form-row-3">
      <div class="form-group"><label>Tên sản phẩm</label><input id="fp-name" value="${pm?pm.name:''}" required/></div>
      <div class="form-group"><label>Mã</label><input id="fp-code" value="${pm?pm.code:''}" required/></div>
      <div class="form-group"><label>NSX</label><input id="fp-mfr" value="${pm?pm.manufacturer:'Vemedim'}"/></div>
    </div>
    <h4>💊 Vitamin</h4>
    <div class="form-row-3">${vitKeys.map(k=>
      `<div class="form-group"><label>${vitLabels[k]||k}</label><input type="number" id="fp-v-${k}" value="${v[k]||''}" placeholder="0"/></div>`
    ).join('')}</div>
    <h4>⚗️ Khoáng chất</h4>
    <div class="form-row-3">${minKeys.map(k=>
      `<div class="form-group"><label>${minLabels[k]||k}</label><input type="number" id="fp-m-${k}" value="${m[k]||''}" placeholder="0"/></div>`
    ).join('')}</div>
    <div class="form-actions"><button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button><button type="submit" class="btn-save">💾 Lưu Premix</button></div>
  </form>`);
}

function savePremix(e, id) {
  e.preventDefault();
  const get = sel => document.getElementById(sel).value;
  const vitamins={}, minerals={};
  ['A','D3','E','K','B1','B2','B6','B12','niacin','pantothenic','folic','biotin'].forEach(k => { const v=get('fp-v-'+k); if(v) vitamins[k]=Number(v); });
  ['iron','zinc','copper','manganese','iodine','selenium','cobalt'].forEach(k => { const v=get('fp-m-'+k); if(v) minerals[k]=Number(v); });
  if (id) {
    const idx = data.premixProducts.findIndex(p=>p.id===id);
    if (idx>=0) { Object.assign(data.premixProducts[idx], {name:get('fp-name'),code:get('fp-code'),manufacturer:get('fp-mfr'),vitamins,minerals,updatedAt:ts()}); addLog('update','premix',get('fp-name')); }
  } else {
    data.premixProducts.push({id:genId('pm'),name:get('fp-name'),code:get('fp-code'),manufacturer:get('fp-mfr'),vitamins,minerals,unit:'IU/kg',createdAt:ts(),updatedAt:ts()});
    addLog('create','premix',get('fp-name'));
  }
  saveData(); closeModal(); renderContent();
}

function deletePremix(id) {
  if (!confirm('Xóa premix này?')) return;
  const idx = data.premixProducts.findIndex(p=>p.id===id);
  if (idx>=0) { addLog('delete','premix',data.premixProducts[idx].name); data.premixProducts.splice(idx,1); saveData(); renderContent(); }
}

/* ═══════════════════════════════════════════════════════════════
   TAB MANAGER
   ═══════════════════════════════════════════════════════════════ */
function openTabManager() {
  openModal('Quản lý Tab', `<div class="tab-mgmt">
    <h4>Tab hiện có</h4>
    <div class="tab-toggle-list">${data.tabs.map(t => `
      <div class="tab-toggle-item"><span>${t.icon} ${t.label}</span>
        <label class="switch"><input type="checkbox" ${t.isActive?'checked':''} onchange="toggleTab('${t.id}')"/><span class="slider"></span></label>
      </div>`).join('')}
    </div>
    <h4>Thêm tab mới</h4>
    <form class="crud-form" onsubmit="addNewTab(event)">
      <div class="form-row-3">
        <div class="form-group"><label>ID</label><input name="id" required placeholder="vd: ga-thit-2"/></div>
        <div class="form-group"><label>Tên hiển thị</label><input name="label" required placeholder="vd: Gà thịt 2"/></div>
        <div class="form-group"><label>Icon</label><input name="icon" required placeholder="🐔"/></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Loại nội dung</label><select name="entityType">
          <option value="formula">Công thức</option><option value="premix">Premix</option>
          <option value="standard">Định mức</option><option value="price">Nguyên liệu</option>
          <option value="limits">Giới hạn</option><option value="price-update">Cập nhật giá</option>
          <option value="import-formula">Import CT</option>
        </select></div>
        <div class="form-group"><label>Lọc loài (nếu CT)</label><select name="species">
          <option value="">Tất cả</option>
          ${['heo','ga','ga-de-cn','ga-thit','da-dieu'].map(s=>`<option value="${s}">${speciesLabel(s)}</option>`).join('')}
        </select></div>
        <div class="form-group"></div>
      </div>
      <button type="submit" class="btn-primary">➕ Thêm tab</button>
    </form>
  </div>`);
}

function toggleTab(id) {
  const t = data.tabs.find(t=>t.id===id);
  if (t) { t.isActive = !t.isActive; saveData(); renderTabs(); }
}

function addNewTab(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const species = fd.get('species');
  data.tabs.push({
    id:fd.get('id'),label:fd.get('label'),icon:fd.get('icon'),
    entityType:fd.get('entityType'),
    filter: species ? {species} : undefined,
    isActive:true, order:data.tabs.length
  });
  saveData(); closeModal(); renderTabs();
}

function resetData() {
  if (!confirm('Reset toàn bộ dữ liệu về mặc định?')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadData(); renderTabs(); renderContent();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
loadData();
renderTabs();
renderContent();
setInterval(() => {
  const el = document.getElementById('liveTime');
  if (el) el.textContent = new Date().toLocaleString('vi-VN');
}, 1000);
document.getElementById('liveTime').textContent = new Date().toLocaleString('vi-VN');
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
</script>
